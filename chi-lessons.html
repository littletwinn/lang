<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'IBM Plex Mono', monospace;
    background: #FFFDEB;
    margin: 0;
    text-align: center;
}

/* TITLE */
.title {
    margin-top: 80px;
    font-size: 28px;
}

/* HOME */
.home-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #ffffff;
    padding: 10px 16px;
    border-radius: 12px;
    text-decoration: none;
    color: #402615;
}

/* BACK */
.back-btn {
    position: fixed;
    top: 20px;
    right: 100px;
    background: #ffffff;
    padding: 10px 16px;
    border-radius: 12px;
    text-decoration: none;
    color: #402615;
}

/* LESSON GRID */
.lesson-container {
    display: grid;
    grid-template-columns: repeat(3, 120px);
    gap: 20px;
    justify-content: center;
    margin-top: 40px;
}

.lesson {
    background: #ffe5e7;
    padding: 20px;
    border-radius: 12px;
    text-decoration: none;
    color: #402615;
    transition: 0.2s;
}

.lesson:hover {
    background: #ffeaeb;
}
</style>

</head>

<body>

<!-- ปุ่ม -->
<a href="index.html" class="home-btn">🏠</a>
<a href="chi.html" class="back-btn">↩</a>

<!-- Title -->
<h1 class="title">Loading...</h1>

<!-- Lessons -->
<div class="lesson-container" id="lessonContainer"></div>

<script>
const params = new URLSearchParams(window.location.search);
const book = params.get("book");

// จำนวนบทแต่ละเล่ม
const lessonsByBook = {
    1: 15,
    2: 10,
    3: 12
};

// เปลี่ยน title
document.querySelector(".title").innerText = "  " + book;

// สร้างบท
const totalLessons = lessonsByBook[book] || 0;
const container = document.getElementById("lessonContainer");

for (let i = 1; i <= totalLessons; i++) {
    const lesson = document.createElement("a");
    lesson.className = "lesson";
    lesson.innerText = " UNIT " + i;

    lesson.href = `lesson.html?book=${book}&lesson=${i}`;

    container.appendChild(lesson);
}
</script>

</body>
</html>
